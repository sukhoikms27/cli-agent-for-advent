# SLF4J simple-logger config (день 16): MCP SDK логирует много debug-сообщений через
# io.github.oshai:kotlin-logging → slf4j. Без этого уровня логи транспорта засоряют REPL.
org.slf4j.simpleLogger.defaultLogLevel=warn
org.slf4j.simpleLogger.log.io.modelcontextprotocol=warn
org.slf4j.simpleLogger.showDateTime=false
org.slf4j.simpleLogger.showThreadName=false
